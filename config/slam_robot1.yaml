slam_toolbox:
  ros__parameters:
    use_sim_time: true
    odom_frame: odom
    base_frame: base_footprint
    map_frame: map
    scan_topic: /robot1/scan
    mode: mapping
    resolution: 0.05
    max_laser_range: 20.0
    minimum_time_interval: 0.5
    transform_publish_period: 0.02
    map_update_interval: 1.0
    transform_timeout: 0.2
